---

- hosts: all
  become: true
  tasks:
  - name: Update apt cache
    apt:
      update_cache: yes
      cache_valid_time: 3600
  - name: Install Apache
    apt:
      name: apache2
      state: latest
  - name: add php support for apache
    apt:
      name: libapache2-mod-php
      state: latest

