---

- hosts: all
  become: true
  pre_tasks:
  - name: Update apt system
    apt:
      upgrade: dist
      update_cache: yes
      cache_valid_time: 3600
    when: ansible_os_family == "Debian"
  - name: update zypper system
    community.general.zypper:
      update_cache: yes
      name: '*'
      state: latest
      type: patch
    when: ansible_os_family == "Suse"

- hosts: web_servers
  become: true
  tasks:
  - name: Install Apache and php support for apache
    apt:
      name:
        - apache2
        - libapache2-mod-php
      state: latest
    when: ansible_os_family == "Debian"
  - name: zypper Update cache and Install Apache
    community.general.zypper:
      name:
        - apache2
        - apache2-mod_php8
      state: latest
    when: ansible_os_family == "Suse"
  
- hosts: db_servers
  become: true
  tasks:
  - name: Install MariaDB server
    apt:
      name: mariadb-server
      state: latest
    when: ansible_os_family == "Debian"
  - name: zypper Update cache and Install MariaDB server
    community.general.zypper:
      name: mariadb-server
      state: latest
    when: ansible_os_family == "Suse"

