---

- hosts: all
  become: true
  tasks:
  - name: Update apt cache
    apt:
      update_cache: yes
      cache_valid_time: 3600
  - name: Remove Apache
    apt:
      name: apache2
      state: absent
  - name: Remove php support for apache
    apt:
      name: libapache2-mod-php
      state: absent

